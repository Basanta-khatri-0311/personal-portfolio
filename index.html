<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/macbook-fill.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <title>Basanta Khatri — Frontend Developer</title>
    <meta name="description" content="Basanta Khatri is a frontend developer who builds fast, accessible and polished web experiences with React and modern CSS." />
    <meta name="keywords" content="Basanta Khatri, Frontend Developer, React, Portfolio, Web Developer Nepal" />

    <!-- Open Graph -->
    <meta property="og:title" content="Basanta Khatri — Frontend Developer" />
    <meta property="og:description" content="Building fast, accessible and polished web experiences." />
    <meta property="og:type" content="website" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the hero profile image (LCP element) -->
    <link rel="preload" href="/profile.jpg" as="image" />

    <!-- Google Fonts — Plus Jakarta Sans with display=swap to prevent FOIT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Remix Icons — load after page paint to avoid render-blocking -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.4.0/fonts/remixicon.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.4.0/fonts/remixicon.css" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
