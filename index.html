<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/macbook-fill.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <title>Basanta Khatri — Fullstack Developer</title>
    <meta name="description" content="Basanta Khatri is a full-stack developer specializing in the MERN stack, building scalable applications and intuitive user experiences." />
    <meta name="keywords" content="Basanta Khatri, Fullstack Developer, MERN Stack, React, Node.js, Portfolio, Web Developer Nepal" />
    <link rel="canonical" href="https://kbasanta.com.np/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kbasanta.com.np/" />
    <meta property="og:title" content="Basanta Khatri — Fullstack Developer" />
    <meta property="og:description" content="Scalable full-stack applications and seamless user experiences." />
    <meta property="og:image" content="https://kbasanta.com.np/profile.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kbasanta.com.np/" />
    <meta property="twitter:title" content="Basanta Khatri — Fullstack Developer" />
    <meta property="twitter:description" content="Scalable full-stack applications and seamless user experiences." />
    <meta property="twitter:image" content="https://kbasanta.com.np/profile.jpg" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the hero profile image (LCP element) -->
    <link rel="preload" href="/profile.jpg" as="image" />

    <!-- Google Fonts — Plus Jakarta Sans with display=swap to prevent FOIT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Remix Icons — load after page paint to avoid render-blocking -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.4.0/fonts/remixicon.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.4.0/fonts/remixicon.css" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
